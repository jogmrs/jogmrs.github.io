en: &DEFAULT_EN
  header:
    title: "Joana Guimarães"
    text: "Entre dados, tecnologia e muitas perguntas boas para investigar."
    button: "Conheça minha trajetória"
    buttonlink: "#services"

  services:
    title: "Áreas de Interesse"
    text: "Temas que despertam minha curiosidade e que quero aprofundar durante a graduação."
    section: services
    list:
      - title: "Ciência de Dados"
        desc: "Tenho interesse em compreender como os dados podem ajudar a investigar problemas, identificar padrões e apoiar decisões."
        icon: fas fa-chart-bar
      - title: "Inteligência Artificial"
        desc: "Quero aprender mais sobre inteligência artificial, suas aplicações e seu uso responsável."
        icon: fas fa-brain
      - title: "Machine Learning"
        desc: "Tenho interesse em aprender como modelos podem identificar padrões em dados e apoiar a criação de soluções inteligentes."
        icon: fas fa-robot

  portfolio:
    title: "Aprendizados em Construção"
    text: "Este espaço será atualizado ao longo da graduação com estudos, atividades e projetos desenvolvidos em Ciência de Dados."
    section: portfolio
    closebutton: "Fechar"

  timeline:
    title: "Minha Trajetória"
    text: "Uma trajetória construída entre indústria, processos, dados e tecnologia."
    section: timeline
   events:
      - title: "Formação complementar na área industrial"
        year: "Antes da graduação"
        desc: "Concluí cursos de Logística e Manutenção Mecânica Industrial pela Aperam, experiências que ampliaram minha visão sobre processos, organização, operação e o contexto industrial."
        image: img/timeline1.png
        alt: "Formação complementar em logística e manutenção industrial"
      - title: "Ciência de Dados"
        year: "2026 — atual"
        desc: "Atualmente curso o 2º período de Ciência de Dados. A mudança representa uma aproximação com análise de dados, programação e tecnologia, áreas que complementam meu interesse por problemas reais e melhoria de processos."
        image: img/timeline2.png
        alt: "Transição para Ciência de Dados"
      - title: "Próximos passos"
        year: "Em construção"
        desc: "Quero desenvolver projetos acadêmicos e experiências práticas envolvendo análise de dados, Inteligência Artificial e Machine Learning, conectando tecnologia a desafios reais."
        image: img/timeline3.png
        alt: "Próximos passos na formação"
        align: right
    end: "Em Construção"

  about:
    title: "Sobre mim"
    text: "Uma trajetória em construção"
    body: "Sou **Joana Guimarães**, estudante do 2º período de Ciência de Dados. Minha trajetória começou com formações complementares em Logística e Manutenção Mecânica Industrial pela Aperam e passou pela Engenharia de Produção, experiências que despertaram meu interesse por processos, organização e resolução de problemas. Hoje, busco aprofundar meus conhecimentos em programação, análise de dados, Inteligência Artificial e Machine Learning, conectando dados e tecnologia a desafios reais."
    section: about

  team:
    title: "Em Desenvolvimento"
    text: "Conhecimentos e interesses que estou construindo durante minha formação."
    subtext: "Meu foco atual é aprender com consistência, conectar experiências anteriores com tecnologia e desenvolver uma base sólida em Ciência de Dados."
    section: team
    people:
      - name: "Joana Guimarães"
        role: "Estudante de Ciência de Dados | 2º período"
        image: assets/img/joana.jpeg
        social:
          - url: https://github.com/jogmrs
            icon: fab fa-github
          - url: https://www.linkedin.com/in/joana-guimaraes-ufv/
            icon: fab fa-linkedin-in

  contact:
    title: "Vamos conversar?"
    text: "Para conexões, oportunidades de aprendizado e projetos acadêmicos."
    section: contact
    name: "Seu nome"
    name-validation: "Por favor, informe seu nome."
    email: "Seu e-mail"
    email-validation: "Por favor, informe um e-mail válido."
    phone: "Seu telefone (opcional)"
    phone-validation: "Por favor, informe um telefone válido."
    message: "Escreva sua mensagem"
    message-validation: "Por favor, escreva uma mensagem."
    subject: "Mensagem enviada pelo site de Joana Guimarães"
    submit: "Enviar mensagem"

  footer:
    legal: "Joana Guimarães · Ciência de Dados"
    social:
      - url: https://github.com/jogmrs
        icon: "fab fa-github"
      - url: https://www.linkedin.com/in/joana-guimaraes-ufv/
        icon: "fab fa-linkedin-in"
        
